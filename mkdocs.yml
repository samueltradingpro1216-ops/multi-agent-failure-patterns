site_name: Multi-Agent Failure Patterns
site_description: Technical catalog of critical bugs in multi-agent AI systems architecture, based on 18 months of production
site_author: Samuel Pages
site_url: https://samueltradingpro1216-ops.github.io/multi-agent-failure-patterns/

repo_url: https://github.com/samueltradingpro1216-ops/multi-agent-failure-patterns
repo_name: GitHub

theme:
  name: material
  language: en
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/solid/paper-plane
      link: https://tally.so/r/vGODE8
      name: Newsletter — early-bird -50%

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

